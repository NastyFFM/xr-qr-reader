<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>QR Reader (Quest Passthrough)</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; min-height: 100%; background: #0b0f14; color: #e6edf3;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  #wrap { max-width: 900px; margin: 0 auto; padding: 18px; }
  h1 { font-size: 20px; margin: 0 0 6px; }
  .hint { margin: 0 0 14px; color: #9fb0c0; line-height: 1.5; font-size: 16px; }

  button {
    font-size: 18px; padding: 14px 18px; border-radius: 12px; border: none;
    background: #2563eb; color: #fff; cursor: pointer; font-weight: 600;
  }
  button.secondary { background: #243140; color: #e6edf3; }
  button:disabled  { opacity: .5; cursor: not-allowed; }

  #status { font-size: 14px; color: #7d8da0; margin: 10px 0; min-height: 1.2em; }

  /* one-sentence instruction above the camera */
  #camInfo { display: none; margin: 4px 0 8px; color: #cfe0f0; font-size: 16px; }
  #camInfo.on { display: block; }

  /* camera preview with scan frame */
  #stage { position: relative; width: 100%; border-radius: 16px; overflow: hidden;
           background: #000; aspect-ratio: 4 / 3; display: none; }
  #stage.on { display: block; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #frame {
    position: absolute; inset: 12% 18%; border: 3px solid rgba(127,196,255,.9);
    border-radius: 14px; box-shadow: 0 0 0 9999px rgba(0,0,0,.25);
    pointer-events: none;
  }

  /* result card — overlaid on the video, centered, always visible */
  #card { display: none;
    position: absolute; left: 50%; bottom: 16px; transform: translateX(-50%);
    width: min(620px, 94%); z-index: 5;
    background: rgba(8,13,20,.93); border: 1px solid #2a3a4d;
    border-radius: 16px; padding: 16px; backdrop-filter: blur(6px);
    box-shadow: 0 10px 30px rgba(0,0,0,.55); }
  #card.show { display: block; }
  #msg { font-size: 16px; margin-bottom: 8px; }
  #qUrl { font-size: 15px; word-break: break-all; color: #7fc4ff;
    background: #0a121c; border: 1px solid #21303f; border-radius: 10px;
    padding: 9px 11px; margin-bottom: 14px; }
  #row { display: flex; gap: 12px; }
  #row button { flex: 1; }
</style>
</head>
<body>
  <div id="wrap">
    <h1>QR Code Reader</h1>

    <!-- one-sentence instruction on the start page -->
    <p id="startInfo" class="hint">Start the camera and point your headset at a QR code &mdash; its link opens automatically in a new tab.</p>

    <button id="startBtn">Start camera</button>
    <button id="stopBtn" class="secondary" style="display:none">Stop camera</button>
    <div id="status">Ready.</div>

    <!-- one-sentence instruction above the camera image -->
    <p id="camInfo">Hold a QR code inside the frame &mdash; the link opens automatically.</p>

    <div id="stage">
      <video id="video" playsinline muted></video>
      <div id="frame"></div>

      <!-- result overlay sits ON TOP of the video so it's always visible in the headset -->
      <div id="card">
        <div id="msg"></div>
        <div id="qUrl"></div>
        <div id="row">
          <button id="openBtn" style="display:none">Open link</button>
          <button id="rescanBtn" class="secondary">Scan next</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
  (function () {
    "use strict";

    const startBtn = document.getElementById("startBtn");
    const stopBtn  = document.getElementById("stopBtn");
    const statusEl = document.getElementById("status");
    const startInfo= document.getElementById("startInfo");
    const camInfo  = document.getElementById("camInfo");
    const stage    = document.getElementById("stage");
    const video    = document.getElementById("video");
    const card     = document.getElementById("card");
    const msgEl    = document.getElementById("msg");
    const qUrlEl   = document.getElementById("qUrl");
    const openBtn  = document.getElementById("openBtn");
    const rescanBtn= document.getElementById("rescanBtn");

    let stream = null, scanning = false, rafId = 0, currentUrl = "";
    let detector = null;
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const setStatus = (m) => { statusEl.textContent = m; };

    // prefer native BarcodeDetector, fall back to jsQR
    (async () => {
      try {
        if ("BarcodeDetector" in window) {
          const fmts = await window.BarcodeDetector.getSupportedFormats();
          if (fmts.includes("qr_code"))
            detector = new window.BarcodeDetector({ formats: ["qr_code"] });
        }
      } catch (_) { detector = null; }
    })();

    startBtn.addEventListener("click", startCamera);
    stopBtn.addEventListener("click", stopCamera);
    rescanBtn.addEventListener("click", () => { card.classList.remove("show"); resumeScan(); });
    openBtn.addEventListener("click", () => openUrl(currentUrl)); // gesture-based fallback

    function openUrl(url) {
      if (!/^https?:\/\//i.test(url)) return false;
      const win = window.open(url, "_blank", "noopener");
      return !!win;
    }

    async function startCamera() {
      setStatus("Starting camera …");
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 960 } }
        });
        video.srcObject = stream;
        await video.play();
        stage.classList.add("on");
        camInfo.classList.add("on");
        startInfo.style.display = "none";
        startBtn.style.display = "none";
        stopBtn.style.display  = "block";
        setStatus(`Camera ready: ${video.videoWidth}×${video.videoHeight}`);
        resumeScan();
      } catch (err) {
        setStatus("Camera error: " + (err && err.message ? err.message : err) +
                  "  (camera permission allowed?)");
      }
    }

    function stopCamera() {
      cancelScan();
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = null; video.srcObject = null;
      stage.classList.remove("on");
      camInfo.classList.remove("on");
      card.classList.remove("show");
      startInfo.style.display = "block";
      startBtn.style.display = "block";
      stopBtn.style.display  = "none";
      setStatus("Camera stopped.");
    }

    function resumeScan() {
      if (scanning) return;
      scanning = true;
      rafId = requestAnimationFrame(scanLoop);
    }
    function cancelScan() {
      scanning = false;
      if (rafId) { cancelAnimationFrame(rafId); rafId = 0; }
    }

    async function scanLoop() {
      if (!scanning) return;
      if (video.readyState >= 2 && video.videoWidth) {
        const text = await scanFrame();
        if (text) { onFound(text); return; }   // pause on hit
      }
      rafId = requestAnimationFrame(scanLoop);
    }

    async function scanFrame() {
      const w = video.videoWidth, h = video.videoHeight;
      const scale = Math.min(1, 640 / Math.max(w, h));
      const cw = Math.round(w * scale), ch = Math.round(h * scale);
      canvas.width = cw; canvas.height = ch;
      ctx.drawImage(video, 0, 0, cw, ch);

      if (detector) {
        try {
          const codes = await detector.detect(canvas);
          if (codes && codes.length) return codes[0].rawValue;
        } catch (_) {}
      }
      if (typeof jsQR !== "undefined") {
        const img = ctx.getImageData(0, 0, cw, ch);
        const code = jsQR(img.data, cw, ch, { inversionAttempts: "attemptBoth" });
        if (code && code.data) return code.data;
      }
      return null;
    }

    function onFound(text) {
      cancelScan();                       // stop scanning so we don't spam tabs
      currentUrl = (text || "").trim();
      qUrlEl.textContent = currentUrl;
      const isHttp = /^https?:\/\//i.test(currentUrl);

      if (isHttp) {
        const opened = openUrl(currentUrl);   // open immediately in a new tab
        if (opened) {
          msgEl.textContent = "Opened in a new tab.";
          openBtn.style.display = "none";
        } else {
          msgEl.textContent = "Popup blocked — tap to open:";
          openBtn.style.display = "block";    // gesture fallback
        }
      } else {
        msgEl.textContent = "QR content (not a web link):";
        openBtn.style.display = "none";
      }
      card.classList.add("show");
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setStatus("getUserMedia not available — HTTPS required.");
      startBtn.disabled = true;
    }
  })();
  </script>
</body>
</html>
