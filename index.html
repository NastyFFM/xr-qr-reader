<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>QR Reader (Quest Passthrough)</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; min-height: 100%; background: #0b0f14; color: #e6edf3;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  #wrap { max-width: 900px; margin: 0 auto; padding: 18px; }
  h1 { font-size: 20px; margin: 0 0 6px; }
  p  { margin: 0 0 14px; color: #9fb0c0; line-height: 1.5; }

  button {
    font-size: 18px; padding: 14px 18px; border-radius: 12px; border: none;
    background: #2563eb; color: #fff; cursor: pointer; font-weight: 600;
  }
  button.secondary { background: #243140; color: #e6edf3; }
  button:disabled  { opacity: .5; cursor: not-allowed; }

  #status { font-size: 14px; color: #7d8da0; margin: 10px 0; min-height: 1.2em; }

  /* Kamera-Vorschau mit Scan-Rahmen */
  #stage { position: relative; width: 100%; border-radius: 16px; overflow: hidden;
           background: #000; aspect-ratio: 4 / 3; display: none; }
  #stage.on { display: block; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #frame {
    position: absolute; inset: 12% 18%; border: 3px solid rgba(127,196,255,.9);
    border-radius: 14px; box-shadow: 0 0 0 9999px rgba(0,0,0,.25);
    pointer-events: none;
  }

  /* Treffer-Karte */
  #card {
    display: none; margin-top: 16px;
    background: rgba(13,19,28,.96); border: 1px solid #2a3a4d;
    border-radius: 16px; padding: 18px;
  }
  #card.show { display: block; }
  #qLabel { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  #qUrl {
    font-size: 16px; word-break: break-all; color: #7fc4ff;
    background: #0a121c; border: 1px solid #21303f; border-radius: 10px;
    padding: 10px 12px; margin-bottom: 16px;
  }
  #row { display: flex; gap: 12px; }
  #row button { flex: 1; }
</style>
</head>
<body>
  <div id="wrap">
    <h1>QR-Code Reader</h1>
    <p>Nutzt die Passthrough-Kamera der Quest. Starte die Kamera, halte einen
       QR-Code in den Rahmen – danach erscheint die URL mit „Link öffnen".</p>

    <button id="startBtn">Kamera starten</button>
    <button id="stopBtn" class="secondary" style="display:none">Kamera stoppen</button>
    <div id="status">Bereit.</div>

    <div id="stage">
      <video id="video" playsinline muted></video>
      <div id="frame"></div>
    </div>

    <div id="card">
      <div id="qLabel">QR-Code erkannt</div>
      <div id="qUrl"></div>
      <div id="row">
        <button id="openBtn">Link öffnen</button>
        <button id="rescanBtn" class="secondary">Weiter scannen</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
  (function () {
    "use strict";

    const startBtn = document.getElementById("startBtn");
    const stopBtn  = document.getElementById("stopBtn");
    const statusEl = document.getElementById("status");
    const stage    = document.getElementById("stage");
    const video    = document.getElementById("video");
    const card     = document.getElementById("card");
    const qUrlEl   = document.getElementById("qUrl");
    const qLabel   = document.getElementById("qLabel");
    const openBtn  = document.getElementById("openBtn");
    const rescanBtn= document.getElementById("rescanBtn");

    let stream = null, scanning = false, rafId = 0, currentUrl = "";
    let detector = null;                 // native BarcodeDetector, falls vorhanden
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    const setStatus = (m) => { statusEl.textContent = m; };

    // Native BarcodeDetector bevorzugen (schneller), sonst jsQR
    (async () => {
      try {
        if ("BarcodeDetector" in window) {
          const fmts = await window.BarcodeDetector.getSupportedFormats();
          if (fmts.includes("qr_code")) {
            detector = new window.BarcodeDetector({ formats: ["qr_code"] });
          }
        }
      } catch (_) { detector = null; }
    })();

    startBtn.addEventListener("click", startCamera);
    stopBtn.addEventListener("click", stopCamera);
    rescanBtn.addEventListener("click", () => { card.classList.remove("show"); resumeScan(); });

    openBtn.addEventListener("click", () => {
      if (!/^https?:\/\//i.test(currentUrl)) return;
      const win = window.open(currentUrl, "_blank", "noopener");  // im Klick = User-Geste
      if (!win) window.location.href = currentUrl;                // Fallback
    });

    async function startCamera() {
      setStatus("Kamera wird gestartet …");
      try {
        // facingMode 'environment' = vordere Passthrough-Kamera der Quest
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 960 } }
        });
        video.srcObject = stream;
        await video.play();
        stage.classList.add("on");
        startBtn.style.display = "none";
        stopBtn.style.display  = "block";
        setStatus(`Kamera bereit: ${video.videoWidth}×${video.videoHeight} – QR in den Rahmen halten.`);
        resumeScan();
      } catch (err) {
        setStatus("Kamera-Fehler: " + (err && err.message ? err.message : err) +
                  "  (Kamera-Berechtigung erlaubt?)");
      }
    }

    function stopCamera() {
      cancelScan();
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = null;
      video.srcObject = null;
      stage.classList.remove("on");
      card.classList.remove("show");
      startBtn.style.display = "block";
      stopBtn.style.display  = "none";
      setStatus("Kamera gestoppt.");
    }

    function resumeScan() {
      if (scanning) return;
      scanning = true;
      rafId = requestAnimationFrame(scanLoop);
    }
    function cancelScan() {
      scanning = false;
      if (rafId) cancelAnimationFrame(rafId), rafId = 0;
    }

    async function scanLoop() {
      if (!scanning) return;
      if (video.readyState >= 2 && video.videoWidth) {
        const text = await scanFrame();
        if (text) { onFound(text); return; }   // Schleife pausiert bei Treffer
      }
      rafId = requestAnimationFrame(scanLoop);
    }

    async function scanFrame() {
      const w = video.videoWidth, h = video.videoHeight;
      // auf max ~640px verkleinern (Performance)
      const scale = Math.min(1, 640 / Math.max(w, h));
      const cw = Math.round(w * scale), ch = Math.round(h * scale);
      canvas.width = cw; canvas.height = ch;
      ctx.drawImage(video, 0, 0, cw, ch);

      // 1) Nativer Detektor (falls vorhanden)
      if (detector) {
        try {
          const codes = await detector.detect(canvas);
          if (codes && codes.length) return codes[0].rawValue;
        } catch (_) { /* fällt unten auf jsQR zurück */ }
      }
      // 2) jsQR
      if (typeof jsQR !== "undefined") {
        const img = ctx.getImageData(0, 0, cw, ch);
        const code = jsQR(img.data, cw, ch, { inversionAttempts: "attemptBoth" });
        if (code && code.data) return code.data;
      }
      return null;
    }

    function onFound(text) {
      cancelScan();
      currentUrl = (text || "").trim();
      qUrlEl.textContent = currentUrl;
      const isHttp = /^https?:\/\//i.test(currentUrl);
      qLabel.textContent = isHttp ? "QR-Code erkannt – Link öffnen?" : "QR-Code erkannt (kein Web-Link)";
      openBtn.disabled = !isHttp;
      openBtn.textContent = isHttp ? "Link öffnen" : "Kein Web-Link";
      card.classList.add("show");
      setStatus("Treffer.");
    }

    // Feature-Check beim Laden
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setStatus("getUserMedia nicht verfügbar – HTTPS nötig.");
      startBtn.disabled = true;
    }
  })();
  </script>
</body>
</html>
